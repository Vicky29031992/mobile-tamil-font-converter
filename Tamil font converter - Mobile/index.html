<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tamil Font Converter</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 10px;
    font-size: 14px;
    background: #f4f0fa;
    color: #2e1a47;
  }
  h2 {
    color: #4b0082;
    text-align: center;
    margin: 8px 0 12px 0;
    font-size: 20px;
  }
  label, .font-label {
    font-weight: bold;
    font-size: 13px;
    color: #3d1265;
  }
  select {
    font-size: 13px;
    padding: 5px 8px;
    margin-left: 4px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #b79ddb;
  }
  .box {
    background: #fff;
    border: 2px solid #c7aef3;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    margin-bottom: 12px;
  }
  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 8px;
    margin-bottom: 8px;
  }
  .encoding-select {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .font-size-group {
    display: flex;
    align-items: center;
  }
  textarea {
    width: 100%;
    height: 300px;
    font-size: 14px;
    padding: 10px;
    border: 1px solid #b79ddb;
    border-radius: 4px;
    resize: vertical;
  }
  .copy-btn, .clear-btn {
    margin-top: 10px;
    align-self: flex-end;
    background: #6a0dad;
    color: white;
    border: none;
    padding: 8px 16px;
    font-size: 13px;
    border-radius: 4px;
    cursor: pointer;
  }
  .copy-btn:hover, .clear-btn:hover {
    background: #5a0080;
  }
  .note {
    color: #4b0082;
    padding-top: 0;
    margin-top: 0;
    font-size: 13px;
    text-align: center;
  }
  
  /* Mobile responsive styling */
  @media (max-width: 768px) {
    body {
      padding: 8px;
    }
    h2 {
      font-size: 18px;
      margin: 6px 0 10px 0;
    }
    .top-row {
      flex-wrap: wrap;
    }
    .encoding-select, .font-size-group {
      flex: 1;
    }
    textarea {
      height: 250px;
      font-size: 14px;
    }
    .copy-btn, .clear-btn {
      width: 100%;
      align-self: center;
      padding: 10px 20px;
    }
  }
  
  @media (max-width: 480px) {
    body {
      padding: 6px;
    }
    textarea {
      height: 220px;
    }
    select {
      font-size: 12px;
      padding: 4px 6px;
    }
    .font-label {
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<h2>Tamil Font Converter</h2>

<div class="box">
  <div class="label-row">
    <label for="input-text">Input Text:</label>
  </div>
  <div class="top-row">
    <div class="encoding-select">
      <span class="font-label">Encoding:</span>
      <select id="input-encoding"></select>
    </div>
    <div class="font-size-group">
      <span class="font-label">Font size:</span>
      <select id="font-size-input">
        <option value="15" selected>15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
        <option value="23">23</option>
        <option value="24">24</option>
        <option value="25">25</option>
        <option value="26">26</option>
        <option value="27">27</option>
        <option value="28">28</option>
        <option value="29">29</option>
        <option value="30">30</option>
      </select>
    </div>
  </div>
  <textarea id="input-text"></textarea>
  <button class="clear-btn" onclick="clearInputText()">Clear Text</button>
</div>

<div class="box">
  <div class="label-row">
    <label for="output-text">Converted Text:</label>
  </div>
  <div class="top-row">
    <div class="encoding-select">
      <span class="font-label">Encoding:</span>
      <select id="output-encoding"></select>
    </div>
    <div class="font-size-group">
      <span class="font-label">Font size:</span>
      <select id="font-size-output">
        <option value="15" selected>15</option>
        <option value="16">16</option>
        <option value="17">17</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
        <option value="23">23</option>
        <option value="24">24</option>
        <option value="25">25</option>
        <option value="26">26</option>
        <option value="27">27</option>
        <option value="28">28</option>
        <option value="29">29</option>
        <option value="30">30</option>
      </select>
    </div>
  </div>
  <textarea id="output-text"></textarea>
  <button class="copy-btn" onclick="copyConverted()">Copy Converted Text</button>
</div>

<div class="note">
  ⚡ Converted text updates instantly as you type or paste!
</div>

<script src="mappings/bamini_to_unicode.js"></script>
<script src="mappings/vanavil_to_unicode.js"></script>
<script src="mappings/sathayam_to_unicode.js"></script>
<script src="mappings/anankuhelv_to_unicode.js"></script>
<script src="mappings/divya_to_unicode.js"></script>

<script>
const fonts = [
  { id: 'unicode', name: 'Unicode', fontFile: 'Tamil Sangam MN' },
  { id: 'bamini', name: 'Bamini', fontFile: 'Bamini' },
  { id: 'vanavil', name: 'Vanavil', fontFile: 'VANAVIL-Avvaiyar' },
  { id: 'sathayam', name: 'Sathayam', fontFile: 'SATHAYAM' },
  { id: 'anankuhelv', name: 'Ananku Helv', fontFile: 'Ananku Helv' },
  { id: 'divya', name: 'divya', fontFile: 'divya' }
];

const baseMappings = {
  bamini: typeof bamini_to_unicode !== 'undefined' ? bamini_to_unicode : null,
  vanavil: typeof vanavil_to_unicode !== 'undefined' ? vanavil_to_unicode : null,
  sathayam: typeof sathayam_to_unicode !== 'undefined' ? sathayam_to_unicode : null,
  anankuhelv: typeof anankuhelv_to_unicode !== 'undefined' ? anankuhelv_to_unicode : null
  divya: typeof divya_to_unicode !== 'undefined' ? divya_to_unicode : null
};

let mappings = {};

function generateFontStyles() {
  let styleContent = '';
  
  // Create a strict sub-range rule mapping only Tamil character blocks to Arial Unicode
  styleContent += `
@font-face {
  font-family: 'ForcedTamilUnicode';
  src: url('font/Tamil Sangam MN.ttf') format('truetype');
  unicode-range: U+0B80-0BFF;
  font-weight: normal;
  font-style: normal;
}

textarea {
  font-family: 'ForcedTamilUnicode', 'Tamil Sangam MN', Arial, sans-serif !important;
}
`;

  fonts.forEach(font => {
    const fontName = font.fontFile + 'Font';
    
    if (font.id !== 'unicode') {
      styleContent += `
@font-face {
  font-family: '${fontName}';
  src: url('font/${font.fontFile}.ttf') format('truetype'),
       url('font/${font.fontFile}.woff') format('woff'),
       url('font/${font.fontFile}.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
`;
    }
    
    if (font.id === 'unicode') {
      styleContent += `
.font-unicode {
  font-family: 'ForcedTamilUnicode', 'Tamil Sangam MN', Arial, sans-serif !important;
}
`;
    } else {
      styleContent += `
.font-${font.id} {
  font-family: '${fontName}', 'ForcedTamilUnicode', 'Tamil Sangam MN', Arial, sans-serif !important;
}
`;
    }
  });
  
  const styleTag = document.createElement('style');
  styleTag.textContent = styleContent;
  document.head.appendChild(styleTag);
}

function populateEncodingSelects() {
  const inputSelect = document.getElementById('input-encoding');
  const outputSelect = document.getElementById('output-encoding');
  fonts.forEach(font => {
    const option1 = document.createElement('option');
    option1.value = font.id;
    option1.textContent = font.name;
    inputSelect.appendChild(option1);

    const option2 = document.createElement('option');
    option2.value = font.id;
    option2.textContent = font.name;
    outputSelect.appendChild(option2);
  });
}

function flipMapping(mapping) {
  const flipped = {};
  if (!mapping) return flipped;
  for (const [key, value] of Object.entries(mapping)) {
    if (!flipped[value]) {
      flipped[value] = key;
    }
  }
  return flipped;
}

function chainMapping(map1, map2) {
  const chained = {};
  if (!map1 || !map2) return chained;
  for (const [key, value] of Object.entries(map1)) {
    if (Object.prototype.hasOwnProperty.call(map2, value)) {
      chained[key] = map2[value];
    }
  }
  return chained;
}

function createPattern(mapping) {
  const keys = Object.keys(mapping).sort((a, b) => b.length - a.length);
  if (keys.length === 0) return null;
  const escapedKeys = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  return new RegExp(escapedKeys.join('|'), 'g');
}

function buildAllMappings() {
  mappings = {};

  const available = {};
  Object.keys(baseMappings).forEach(id => {
    if (baseMappings[id]) available[id] = baseMappings[id];
  });

  const ids = Object.keys(available);

  ids.forEach(from => {
    mappings[`${from}_to_unicode`] = available[from];
    mappings[`unicode_to_${from}`] = flipMapping(available[from]);
  });

  for (let i = 0; i < ids.length; i++) {
    for (let j = 0; j < ids.length; j++) {
      if (i === j) continue;
      const from = ids[i];
      const to = ids[j];
      const key = `${from}_to_${to}`;
      if (available[from] && available[to]) {
        mappings[key] = chainMapping(available[from], flipMapping(available[to]));
      }
    }
  }

  console.log('Mappings loaded:', Object.keys(mappings).length);
}

function doFontConversion() {
  const inputText = document.getElementById('input-text').value;
  const inputEncoding = document.getElementById('input-encoding').value;
  const outputEncoding = document.getElementById('output-encoding').value;

  if (inputEncoding === outputEncoding) {
    document.getElementById('output-text').value = inputText;
    return;
  }

  const mapping = mappings[`${inputEncoding}_to_${outputEncoding}`];
  if (!mapping || Object.keys(mapping).length === 0) {
    document.getElementById('output-text').value = inputText;
    return;
  }

  const pattern = createPattern(mapping);
  if (!pattern) {
    document.getElementById('output-text').value = inputText;
    return;
  }

  document.getElementById('output-text').value = inputText.replace(pattern, match => mapping[match] || match);
}

function updateInputFont() {
  const encoding = document.getElementById('input-encoding').value;
  const textarea = document.getElementById('input-text');
  fonts.forEach(font => textarea.classList.remove(`font-${font.id}`));
  textarea.classList.add(`font-${encoding}`);
  doFontConversion();
}

function updateOutputFont() {
  const encoding = document.getElementById('output-encoding').value;
  const textarea = document.getElementById('output-text');
  fonts.forEach(font => textarea.classList.remove(`font-${font.id}`));
  textarea.classList.add(`font-${encoding}`);
  doFontConversion();
}

document.getElementById('input-text').addEventListener('input', doFontConversion);
document.getElementById('input-encoding').addEventListener('change', updateInputFont);
document.getElementById('output-encoding').addEventListener('change', updateOutputFont);

function copyConverted() {
  const outputBox = document.getElementById('output-text');
  outputBox.select();
  document.execCommand('copy');
  alert("Converted text copied!");
}

function clearInputText() {
  document.getElementById('input-text').value = '';
  document.getElementById('output-text').value = '';
  doFontConversion();
}

document.getElementById('font-size-input').addEventListener('change', function() {
  document.getElementById('input-text').style.fontSize = this.value + "px";
});

document.getElementById('font-size-output').addEventListener('change', function() {
  document.getElementById('output-text').style.fontSize = this.value + "px";
});

window.onload = async function() {
  generateFontStyles();
  populateEncodingSelects();
  document.getElementById('input-text').style.fontSize = '15px';
  document.getElementById('output-text').style.fontSize = '15px';
  document.getElementById('input-encoding').value = 'bamini';
  document.getElementById('output-encoding').value = 'unicode';
  buildAllMappings();

  await document.fonts.ready;

  updateInputFont();
  updateOutputFont();
  doFontConversion();
};
</script>

</body>
</html>
